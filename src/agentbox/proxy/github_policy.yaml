# GitHub access policy for the agentbox proxy.
#
# This file is bundled with agentbox and loaded unconditionally by the
# proxy. It carries the curated GraphQL operation allowlists that
# Layer 1 of the /graphql gate enforces. It does *not* carry per-repo
# scope (that comes from the launcher via repos.json) or the network
# host allowlist (that lives in allowlist.yaml).
#
# The split exists so GitHub-specific policy is decoupled from
# whatever shape the network allowlist is in -- a project can keep
# its network permissive while still benefitting from the curated
# operation allowlist + per-repo scope check.
#
# A user-supplied `--allowlist` YAML may carry a top-level `github:`
# block; if it does, it replaces the contents of this file wholesale
# for that session. Drop the block (or pass a `--allowlist` without
# one) to inherit these defaults.

# Two layers run on every POST to api.github.com/graphql:
#   1. graphql_operations (default-deny). Any operation type/field name
#      not on the allowlist is blocked as "unsupported_feature" and
#      logged so operators can extend the list as GitHub adds features.
#   2. repos[]. The launcher passes one or more `--repo OWNER/NAME`
#      flags; mutations whose targeted repo isn't in this list are
#      blocked as "out_of_scope". Reads (queries) work against any
#      repo the host's PAT can already see -- the token itself is the
#      outer fence; the gate just keeps writes inside the named repos.
graphql_operations:
  queries:
    # Curated supported-query allowlist. Anything outside this list
    # returns "unsupported_feature" + structured log line (so the
    # operator can decide whether to add it).
    - viewer
    - repository
    - organization
    - user
    - node
    - nodes
    - search
    - rateLimit
    - __schema
    - __type
  mutations:
    # Curated supported-mutation allowlist. Default v1 set covers
    # the common `gh` PR/issue/review flow.
    - addComment
    - addLabelsToLabelable
    - addPullRequestReview
    - closeIssue
    - createCommitOnBranch
    - createIssue
    - createPullRequest
    - mergePullRequest
    - markPullRequestReadyForReview
    - removeLabelsFromLabelable
    - reopenIssue
    - requestReviews
    - submitPullRequestReview
    - updateIssue
    - updatePullRequest
  subscriptions: []
  dangerous:
    # Shadow-mode watchlist. These operations are *not* blocked --
    # if Layer 2 (scope) says the request targets an allowed repo,
    # it goes through. But each match emits a WARN log line so
    # operators can spot agent behaviour worth tightening (drop
    # the field from `mutations:` above, narrow `repos:`, or fix
    # the agent's prompt).
    #
    # Patterns are fnmatch-style and match the full
    # `<type>/<field>` tag (so you can warn on a query if you
    # want, e.g. `query/__schema` for introspection probing).
    - mutation/mergePullRequest
    - mutation/createCommitOnBranch
    # Add more if you broaden `mutations:` above. Common candidates:
    # - mutation/deleteRepository
    # - mutation/transferRepository
    # - mutation/archiveRepository
    # - mutation/unarchiveRepository
    # - mutation/deleteRef               # branch/tag deletion
    # - mutation/createBranchProtectionRule
    # - mutation/deleteBranchProtectionRule
    # - mutation/addEnterpriseAdmin

# repos:
#   - full_name: your-org/your-repo
#     pull_requests: ["*"]    # reserved for v2 (per-PR write scoping)
#     issues:        ["*"]    # reserved for v2
#     branches:      ["*"]    # reserved for v3 (git push REST scoping)
#
# TODO(policy-language): the per-repo fields above are placeholders
# for a richer policy language. We want to express things like:
#   - operations: [addComment, createPullRequest]   # per-repo op subset
#   - issue_authors: [@me]                          # only act on issues you opened
#   - pull_request_authors: [@me]
#   - branches_matching: ["agent/*", "!main"]
#   - dangerous_overrides: [...]                    # per-repo watchlist
# The scope check already decodes per-object DB IDs from node IDs,
# so the enforcement substrate is in place. See matching markers in
# ``cli.py``, ``proxy/graphql_scope.py``, and ``docs/design.md``.
